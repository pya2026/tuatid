<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>CRUZY — สั่งตัวติด 3D</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans Thai',sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}

  .phone-frame{width:390px;height:780px;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;border:8px solid #111;position:relative;flex-shrink:0}
  .mobile-mode .phone-frame{width:100%;height:100vh;max-width:100%;border-radius:0;border:none;box-shadow:none}
  .screen{display:none;flex-direction:column;flex:1;height:100%}
  .screen.active{display:flex}

  /* ── LIFF Common ── */
  .liff-header{background:#1a1a1a;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:12px;flex-shrink:0}
  .liff-header .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.15);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .2s}
  .liff-header .close-btn:hover{background:rgba(255,255,255,.25)}
  .liff-header .brand{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:#F5C518;flex:1}
  .liff-header .step-label{font-size:11px;color:#aaa;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:12px}

  .liff-body{flex:1;overflow-y:auto;padding:16px 12px;background:#f5f5f0;scroll-behavior:smooth}

  .page-title{font-size:18px;font-weight:700;color:#333;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .page-subtitle{font-size:12px;color:#888;margin-bottom:16px}

  /* ── Category tabs ── */
  .cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{white-space:nowrap;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #e0e0e0;background:#fff;color:#666;transition:all .2s;flex-shrink:0}
  .cat-tab.active{background:#F5C518;color:#1a1a1a;border-color:#F5C518}
  .cat-tab .cat-count{display:inline-block;background:rgba(0,0,0,.1);padding:1px 6px;border-radius:10px;font-size:11px;margin-left:4px}
  .cat-tab.active .cat-count{background:rgba(0,0,0,.15)}

  /* ── Category section ── */
  .cat-section{margin-bottom:20px}
  .cat-section-title{font-size:15px;font-weight:700;color:#F5C518;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #F5C518;display:flex;align-items:center;gap:6px}
  .cat-section.hidden{display:none}

  /* ── Search bar ── */
  .search-bar{margin-bottom:12px}
  .search-bar input{width:100%;padding:10px 14px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;font-family:'Noto Sans Thai',sans-serif;outline:none;transition:border-color .2s}
  .search-bar input:focus{border-color:#F5C518}

  /* ── Style grid ── */
  .style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .style-card{border:2.5px solid #e8e8e8;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;background:#fff;position:relative}
  .style-card:hover{border-color:#F5C518;transform:scale(1.03)}
  .style-card.selected{border-color:#F5C518;box-shadow:0 0 0 3px rgba(245,197,24,.2)}
  .style-card .st-img{width:100%;aspect-ratio:1;background:#f5f5f5;overflow:hidden}
  .style-card .st-img img{width:100%;height:100%;object-fit:cover}
  .style-card .st-label{padding:6px 4px;text-align:center;font-size:11px;font-weight:600;color:#555;background:#fff}
  .style-card .st-price{font-size:10px;color:#b8940e;font-weight:600;text-align:center;padding-bottom:4px}
  .style-card .st-check{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:#F5C518;color:#1a1a1a;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .style-card.selected .st-check{display:flex}
  .style-card .st-stock{position:absolute;top:4px;left:4px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;line-height:1.2;pointer-events:none;z-index:2}
  .style-card .st-stock.in{background:#e8f5e9;color:#2e7d32}
  .style-card .st-stock.out{background:#ffebee;color:#c62828}
  .style-card.out-of-stock{opacity:.5;pointer-events:none}

  .sel-summary{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .sel-tag{display:flex;align-items:center;gap:4px;background:#fffde8;border:1.5px solid #F5C518;border-radius:20px;padding:3px 10px 3px 4px;font-size:11px;font-weight:600;color:#333;animation:fadeUp .2s ease}
  .sel-tag img{width:22px;height:22px;border-radius:50%;object-fit:cover}
  .sel-tag .remove{cursor:pointer;margin-left:2px;color:#ccc;font-weight:700}
  .sel-tag .remove:hover{color:#e44d26}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ── Bottom bars ── */
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;z-index:10}
  .bottom-bar .bb-row{display:flex;gap:8px;align-items:center}
  .bb-info{font-size:12px;color:#888;text-align:center;margin-bottom:2px}
  .bb-info strong{color:#F5C518}
  .btn-primary{flex:1;padding:13px;background:#F5C518;color:#1a1a1a;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans Thai',sans-serif}
  .btn-primary:hover{background:#e6b800;transform:translateY(-1px)}
  .btn-primary:disabled{background:#ddd;color:#aaa;cursor:not-allowed;transform:none}

  /* ── Confirm overlay ── */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .overlay.show{display:flex}
  .confirm-sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:24px 20px 30px;animation:slideUp .3s ease;max-height:85%;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .confirm-sheet h3{font-size:18px;color:#333;margin-bottom:16px;text-align:center}
  .cs-group{margin-bottom:16px}
  .cs-group-title{font-size:14px;font-weight:700;color:#F5C518;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .cs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cs-item{text-align:center}
  .cs-item img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;border:2px solid #e8e8e8}
  .cs-item .cs-name{font-size:10px;color:#555;margin-top:3px;font-weight:600}
  .cs-total{display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid #F5C518;margin-top:8px;font-size:14px}
  .cs-total .ct-lb{color:#888}
  .cs-total .ct-vl{font-weight:700;color:#b8940e}
  .cs-stat{display:flex;gap:16px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
  .cs-stat-item{text-align:center;background:#f8f8f5;border-radius:12px;padding:10px 18px}
  .cs-stat-item .sv{font-size:24px;font-weight:800;color:#1a1a1a}
  .cs-stat-item .sl{font-size:11px;color:#888;margin-top:2px}
  .warning-text{text-align:center;font-size:12px;color:#e44d26;margin-bottom:12px}
  .confirm-btns{display:flex;gap:10px;margin-top:16px}
  .confirm-btns button{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;transition:.2s}
  .confirm-btns .c-cancel{border:2px solid #ddd;background:#fff;color:#888}
  .confirm-btns .c-cancel:hover{background:#f5f5f5}
  .confirm-btns .c-confirm{border:none;background:#F5C518;color:#1a1a1a;font-weight:700}
  .confirm-btns .c-confirm:hover{background:#e6b800}

  .nothing-msg{text-align:center;padding:20px;color:#e44d26;font-size:14px;font-weight:600}

  .toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#F5C518;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:600;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  /* ── Loading ── */
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;background:#f5f5f0;gap:16px}
  .loading-screen .spin{font-size:40px;animation:spin 1s linear infinite;display:inline-block}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .loading-screen p{font-size:14px;color:#888}
  .loading-error{color:#e44d26;text-align:center;padding:20px;font-size:14px}
  .loading-error button{margin-top:12px;padding:10px 24px;background:#F5C518;color:#1a1a1a;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans Thai',sans-serif}

  .reset-btn{position:fixed;bottom:30px;right:30px;background:#F5C518;color:#1a1a1a;border:none;padding:14px 24px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,197,24,.4);font-family:'Noto Sans Thai',sans-serif;transition:all .2s;z-index:100}
  .reset-btn:hover{transform:translateY(-2px)}

  @media(max-width:500px){body{padding:0;background:#fff}.phone-frame{width:100%;height:100vh;max-width:100%;border-radius:0;border:none;box-shadow:none}.reset-btn{display:none}}
  @media(min-width:501px) and (max-width:900px){body{padding:10px}.phone-frame{width:100%;max-width:420px;height:calc(100vh - 20px)}.reset-btn{bottom:10px;right:10px;padding:10px 18px;font-size:13px}}
  .liff-body::-webkit-scrollbar{width:4px}
  .liff-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
</style>
</head>
<body>

<div class="phone-frame" id="phone">

  <!-- ════ Main Screen: Product Selection ════ -->
  <div class="screen active" id="screenMain">
    <div class="liff-header">
      <button class="close-btn" onclick="closeLiff()">✕</button>
      <span class="brand">CRUZY</span>
      <span class="step-label" id="stepLabel">สั่งซื้อ</span>
    </div>
    <div class="liff-body" id="bodyMain">
      <!-- Loading state -->
      <div id="loadingState" class="loading-screen">
        <div class="spin">⏳</div>
        <p>กำลังโหลดสินค้า...</p>
      </div>
      <!-- Content (hidden until loaded) -->
      <div id="contentArea" style="display:none">
        <div class="page-title">✨ สั่งตัวติด 3D</div>
        <div class="page-subtitle">เลือกแบบที่ต้องการได้หลายแบบ (อย่างละ 1 ชิ้น)</div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อสินค้า..." oninput="filterProducts()">
        </div>
        <div class="cat-tabs" id="catTabs"></div>
        <div id="productSections"></div>
        <div class="sel-summary" id="selSummary"></div>
        <div style="height:120px"></div>
      </div>
    </div>
    <div class="bottom-bar" id="bottomBar" style="display:none">
      <div class="bb-info" id="selInfo">เลือกแล้ว <strong>0</strong> รายการ</div>
      <div class="bb-row">
        <button class="btn-primary" id="confirmBtn" onclick="showConfirm()" disabled>สั่งซื้อ ✓</button>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="if(event.target===this)hideConfirm()">
    <div class="confirm-sheet" id="confirmSheet"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<button class="reset-btn" onclick="resetAll()">🔄 เริ่มใหม่</button>

<script>
/* ═══ Config ═══ */
const LIFF_ID = '2009609185-pRes2K3v';
const SERVER_URL = 'https://tuatid-production-13e1.up.railway.app';

/* ═══ State ═══ */
let allProducts = [];       // flat array of all products from API
let groupedData = [];       // [{category, products}] from API
let selectedIds = new Set(); // set of product IDs
let activeCategory = 'all'; // current category filter

/* ═══ LIFF Init ═══ */
let liffReady = false;

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    liffReady = true;
    console.log('LIFF initialized OK. isInClient:', liff.isInClient());
    if (!liff.isInClient() && !liff.isLoggedIn()) {
      liff.login();
    }
  } catch(e) {
    console.error('LIFF init error:', e);
  }
}
initLiff();

/* ═══ Load products from API ═══ */
async function loadProducts() {
  try {
    const res = await fetch(SERVER_URL + '/api/products/grouped');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    groupedData = data.groups || [];
    allProducts = [];
    groupedData.forEach(g => {
      g.products.forEach(p => {
        p._categoryName = g.category;
        p._categorySlug = g.slug || '';
        allProducts.push(p);
      });
    });

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('contentArea').style.display = 'block';
    document.getElementById('bottomBar').style.display = '';

    buildCategoryTabs();
    buildProductSections();
    updateUI();
  } catch(e) {
    console.error('Load products error:', e);
    document.getElementById('loadingState').innerHTML =
      '<div class="loading-error">ไม่สามารถโหลดสินค้าได้<br><small>' + e.message + '</small><br><button onclick="loadProducts()">ลองใหม่</button></div>';
  }
}

/* ═══ Category tabs ═══ */
function buildCategoryTabs() {
  const tabsEl = document.getElementById('catTabs');
  let html = '<div class="cat-tab active" onclick="switchCategory(\'all\')">ทั้งหมด<span class="cat-count">' + allProducts.filter(p=>p.active!==0).length + '</span></div>';
  groupedData.forEach(g => {
    const count = g.products.filter(p=>p.active!==0).length;
    html += '<div class="cat-tab" data-cat="' + (g.slug||g.category) + '" onclick="switchCategory(\'' + (g.slug||g.category) + '\')">' + g.category + '<span class="cat-count">' + count + '</span></div>';
  });
  tabsEl.innerHTML = html;
}

function switchCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  if (cat === 'all') {
    document.querySelector('.cat-tab').classList.add('active');
  } else {
    const el = document.querySelector('.cat-tab[data-cat="'+cat+'"]');
    if (el) el.classList.add('active');
  }
  filterProducts();
}

/* ═══ Build product sections ═══ */
function buildProductSections(filter) {
  const container = document.getElementById('productSections');
  let html = '';

  groupedData.forEach(g => {
    const catKey = g.slug || g.category;
    let products = g.products.filter(p => p.active !== 0);

    if (filter) {
      const q = filter.toLowerCase();
      products = products.filter(p => p.name.toLowerCase().includes(q) || String(p.id).includes(q));
    }

    const isHidden = (activeCategory !== 'all' && activeCategory !== catKey) || products.length === 0;

    html += '<div class="cat-section' + (isHidden ? ' hidden' : '') + '" data-cat-section="' + catKey + '">';
    html += '<div class="cat-section-title">📁 ' + g.category + ' (' + products.length + ')</div>';
    html += '<div class="style-grid">';

    products.forEach(p => {
      const isSelected = selectedIds.has(p.id);
      const outOfStock = p.stock <= 0;
      html += '<div class="style-card' + (isSelected?' selected':'') + (outOfStock?' out-of-stock':'') + '" data-id="' + p.id + '" onclick="toggleProduct(' + p.id + ')">';

      if (outOfStock) {
        html += '<div class="st-stock out">หมด</div>';
      } else if (p.stock <= 5) {
        html += '<div class="st-stock in">เหลือ ' + p.stock + '</div>';
      }

      const imgSrc = p.image_url || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2214%22>No Image</text></svg>';
      html += '<div class="st-img"><img src="' + imgSrc + '" alt="' + p.name + '" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2214%22>No Image</text></svg>\'"></div>';
      html += '<div class="st-label">' + p.name + '</div>';
      if (p.price > 0) {
        html += '<div class="st-price">฿' + p.price.toLocaleString() + '</div>';
      }
      html += '<div class="st-check">✓</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  container.innerHTML = html;
}

/* ═══ Filter ═══ */
function filterProducts() {
  const q = document.getElementById('searchInput').value.trim();
  buildProductSections(q);
}

/* ═══ Toggle selection ═══ */
function toggleProduct(id) {
  const product = allProducts.find(p => p.id === id);
  if (!product || product.stock <= 0) return;

  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }

  // Update card visual
  document.querySelectorAll('.style-card[data-id="'+id+'"]').forEach(c => {
    c.classList.toggle('selected', selectedIds.has(id));
  });

  updateUI();
}

function removeFromSel(id) {
  selectedIds.delete(id);
  document.querySelectorAll('.style-card[data-id="'+id+'"]').forEach(c => {
    c.classList.remove('selected');
  });
  updateUI();
}

/* ═══ Update UI ═══ */
function updateUI() {
  const count = selectedIds.size;

  // Selection summary tags
  const sumEl = document.getElementById('selSummary');
  if (count === 0) {
    sumEl.innerHTML = '';
  } else {
    sumEl.innerHTML = [...selectedIds].map(id => {
      const p = allProducts.find(x => x.id === id);
      if (!p) return '';
      const img = p.image_url || '';
      return '<div class="sel-tag">' + (img ? '<img src="'+img+'">' : '') + '<span>' + p.name + '</span><span class="remove" onclick="event.stopPropagation();removeFromSel('+id+')">✕</span></div>';
    }).join('');
  }

  // Bottom bar info
  document.getElementById('selInfo').innerHTML = 'เลือกแล้ว <strong>' + count + '</strong> รายการ';
  document.getElementById('confirmBtn').disabled = count === 0;
}

/* ═══ Confirm overlay ═══ */
function showConfirm() {
  if (selectedIds.size === 0) {
    showNothingAlert();
    return;
  }

  // Group selected items by category
  const groups = {};
  selectedIds.forEach(id => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    const cat = p._categoryName || 'อื่นๆ';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  const total = selectedIds.size;
  let totalPrice = 0;
  selectedIds.forEach(id => {
    const p = allProducts.find(x => x.id === id);
    if (p) totalPrice += (p.price || 0);
  });

  let html = '<h3>📋 สรุปคำสั่งซื้อ</h3>';

  // Stats
  html += '<div class="cs-stat">';
  html += '<div class="cs-stat-item"><div class="sv">' + total + '</div><div class="sl">รายการ</div></div>';
  if (totalPrice > 0) {
    html += '<div class="cs-stat-item"><div class="sv">฿' + totalPrice.toLocaleString() + '</div><div class="sl">รวมเงิน</div></div>';
  }
  html += '</div>';

  // Items by category
  Object.keys(groups).forEach(cat => {
    html += '<div class="cs-group"><div class="cs-group-title">📁 ' + cat + ' (' + groups[cat].length + ' ชิ้น)</div><div class="cs-grid">';
    groups[cat].forEach(p => {
      const img = p.image_url || '';
      html += '<div class="cs-item">' + (img ? '<img src="'+img+'">' : '<div style="width:100%;aspect-ratio:1;background:#f0f0f0;border-radius:10px"></div>') + '<div class="cs-name">' + p.name + '</div></div>';
    });
    html += '</div></div>';
  });

  html += '<div class="warning-text">⚠️ กดยืนยันแล้วจะไม่สามารถแก้ไขได้</div>';
  html += '<div class="confirm-btns"><button class="c-cancel" onclick="hideConfirm()">กลับไปแก้ไข</button><button class="c-confirm" onclick="submitOrder()">✅ คอนเฟิร์ม</button></div>';

  document.getElementById('confirmSheet').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function showNothingAlert() {
  document.getElementById('confirmSheet').innerHTML =
    '<div class="nothing-msg">⚠️ ยังไม่ได้เลือกสินค้าเลย<br>กรุณากลับไปเลือกอย่างน้อย 1 รายการ</div>' +
    '<div class="confirm-btns"><button class="c-cancel" onclick="hideConfirm()">← กลับไปเลือก</button></div>';
  document.getElementById('overlay').classList.add('show');
}

function hideConfirm() { document.getElementById('overlay').classList.remove('show'); }

/* ═══ Submit order ═══ */
async function submitOrder() {
  hideConfirm();

  const items = [...selectedIds].map(id => {
    const p = allProducts.find(x => x.id === id);
    return { product_id: id, name: p ? p.name : 'Unknown', quantity: 1, price: p ? (p.price||0) : 0 };
  });

  showToast('คอนเฟิร์มการสั่งแล้ว!');

  // Get LINE userId
  let userId = null;
  if (liffReady) {
    try {
      const profile = await liff.getProfile();
      userId = profile.userId;
    } catch(e) { console.error('getProfile:', e); }
  }

  // Send to server
  try {
    await fetch(SERVER_URL + '/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, userId })
    });
  } catch(e) { console.error('Send order error:', e); }

  // Close LIFF
  if (liffReady && liff.isInClient()) {
    liff.closeWindow();
  } else {
    alert('คอนเฟิร์มการสั่งแล้ว!\nกรุณากลับไปที่ LINE แชทเพื่อดูสรุปและ PDF');
  }
}

/* ═══ Helpers ═══ */
function closeLiff() {
  if (liffReady && liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  selectedIds.clear();
  document.getElementById('searchInput').value = '';
  activeCategory = 'all';
  buildCategoryTabs();
  buildProductSections();
  updateUI();
}

/* ═══ Init ═══ */
loadProducts();
</script>
