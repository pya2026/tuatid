<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>CRUZY — สั่งตัวติด 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans Thai',sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px}

  .phone-frame{width:390px;height:780px;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;border:8px solid #111;position:relative;flex-shrink:0}
  .mobile-mode .phone-frame{width:100%;height:100vh;max-width:100%;border-radius:0;border:none;box-shadow:none}
  .screen{display:none;flex-direction:column;flex:1;height:100%}
  .screen.active{display:flex}

  /* ── LINE Chat ── */
  .line-header{background:#06C755;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .line-header .back{font-size:22px;width:30px;cursor:pointer}
  .line-header .av{width:36px;height:36px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:11px;font-weight:800;color:#F5C518;letter-spacing:.5px}
  .line-header .nm{font-weight:600;font-size:16px}
  .chat-area{flex:1;overflow-y:auto;padding:16px;background:#8CABC7;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .msg-row{display:flex;gap:8px;animation:fadeUp .3s ease}
  .msg-row.bot{justify-content:flex-start}
  .msg-row.user{justify-content:flex-end}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .bot-av{width:32px;height:32px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:8px;font-weight:800;color:#F5C518;flex-shrink:0;margin-top:auto;letter-spacing:.3px}
  .bubble{max-width:260px;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5}
  .bot .bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .user .bubble{background:#06C755;color:#fff;border-bottom-right-radius:4px}
  .miniapp-card{background:#fff;border-radius:16px;overflow:hidden;max-width:260px;box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;transition:transform .2s}
  .miniapp-card:hover{transform:scale(1.02)}
  .miniapp-card .card-banner{height:110px;background:#1a1a1a;display:flex;align-items:center;justify-content:center}
  .miniapp-card .card-banner .brand-text{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;color:#F5C518;text-shadow:0 0 20px rgba(245,197,24,.4)}
  .miniapp-card .card-info{padding:12px}
  .miniapp-card .card-info h4{font-size:14px;color:#333}
  .miniapp-card .card-info p{font-size:12px;color:#888;margin-top:4px}
  .miniapp-card .card-info .open-tag{display:inline-block;margin-top:8px;background:#F5C518;color:#1a1a1a;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700}
  .summary-card{background:#fff;border-radius:16px;overflow:hidden;max-width:270px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .summary-card .s-header{background:#1a1a1a;color:#F5C518;padding:14px;text-align:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px}
  .summary-card .s-body{padding:14px}
  .summary-card .s-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
  .summary-card .s-row:last-child{border:none}
  .summary-card .s-row .lb{color:#888}
  .summary-card .s-row .vl{font-weight:600;color:#333}
  .summary-card .s-id{text-align:center;padding:0 14px 14px;font-size:12px;color:#F5C518;font-weight:600}
  .summary-card .s-group{font-size:12px;font-weight:700;color:#F5C518;padding:8px 0 2px;margin-top:4px}

  /* ── LIFF Common ── */
  .liff-header{background:#1a1a1a;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:12px;flex-shrink:0}
  .line-header{padding-top:calc(12px + env(safe-area-inset-top,0px))}
  .liff-header .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.15);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .2s}
  .liff-header .close-btn:hover{background:rgba(255,255,255,.25)}
  .liff-header .brand{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;color:#F5C518;flex:1}
  .liff-header .step-label{font-size:11px;color:#aaa;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:12px}

  .liff-body{flex:1;overflow-y:auto;padding:16px 12px;background:#f5f5f0;scroll-behavior:smooth}

  .page-title{font-size:18px;font-weight:700;color:#333;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .page-subtitle{font-size:12px;color:#888;margin-bottom:16px}

  /* ── Style grid ── */
  .search-bar{margin-bottom:12px}
  .search-bar input{width:100%;padding:10px 14px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;font-family:'Noto Sans Thai',sans-serif;outline:none;transition:border-color .2s}
  .search-bar input:focus{border-color:#F5C518}
  .style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .style-card{border:2.5px solid #e8e8e8;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;background:#fff;position:relative}
  .style-card:hover{border-color:#F5C518;transform:scale(1.03)}
  .style-card.selected{border-color:#F5C518;box-shadow:0 0 0 3px rgba(245,197,24,.2)}
  .style-card .st-img{width:100%;aspect-ratio:1;background:#f5f5f5;overflow:hidden}
  .style-card .st-img img{width:100%;height:100%;object-fit:cover}
  .style-card .st-label{padding:6px 4px;text-align:center;font-size:11px;font-weight:600;color:#555;background:#fff}
  .style-card .st-check{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:#F5C518;color:#1a1a1a;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .style-card.selected .st-check{display:flex}
  .style-card .size-badge{position:absolute;top:4px;left:4px;background:#FFF9C4;color:#1565C0;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;line-height:1.2;pointer-events:none;z-index:2}

  .sel-summary{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
  .sel-tag{display:flex;align-items:center;gap:4px;background:#fffde8;border:1.5px solid #F5C518;border-radius:20px;padding:3px 10px 3px 4px;font-size:11px;font-weight:600;color:#333;animation:fadeUp .2s ease}
  .sel-tag img{width:22px;height:22px;border-radius:50%;object-fit:cover}
  .sel-tag .remove{cursor:pointer;margin-left:2px;color:#ccc;font-weight:700}
  .sel-tag .remove:hover{color:#e44d26}

  /* ── Bottom bars ── */
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;z-index:10}
  .bottom-bar .bb-row{display:flex;gap:8px;align-items:center}
  .bb-info{font-size:12px;color:#888;text-align:center;margin-bottom:2px}
  .bb-info strong{color:#F5C518}
  .btn-primary{flex:1;padding:13px;background:#F5C518;color:#1a1a1a;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans Thai',sans-serif}
  .btn-primary:hover{background:#e6b800;transform:translateY(-1px)}
  .btn-primary:disabled{background:#ddd;color:#aaa;cursor:not-allowed;transform:none}
  .btn-skip{flex:1;padding:13px;background:#fff;color:#888;border:2px solid #ddd;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Noto Sans Thai',sans-serif}
  .btn-skip:hover{border-color:#aaa;color:#555}

  /* ── Confirm overlay ── */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .overlay.show{display:flex}
  .confirm-sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:24px 20px 30px;animation:slideUp .3s ease;max-height:85%;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .confirm-sheet h3{font-size:18px;color:#333;margin-bottom:16px;text-align:center}
  .cs-group{margin-bottom:16px}
  .cs-group-title{font-size:14px;font-weight:700;color:#F5C518;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .cs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .cs-item{text-align:center}
  .cs-item img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;border:2px solid #e8e8e8}
  .cs-item .cs-name{font-size:10px;color:#555;margin-top:3px;font-weight:600}
  .cs-total{display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid #F5C518;margin-top:8px;font-size:14px}
  .cs-total .ct-lb{color:#888}
  .cs-total .ct-vl{font-weight:700;color:#b8940e}
  .cs-stat{display:flex;gap:16px;justify-content:center;margin-bottom:12px}
  .cs-stat-item{text-align:center;background:#f8f8f5;border-radius:12px;padding:10px 18px}
  .cs-stat-item .sv{font-size:24px;font-weight:800;color:#1a1a1a}
  .cs-stat-item .sl{font-size:11px;color:#888;margin-top:2px}
  .warning-text{text-align:center;font-size:12px;color:#e44d26;margin-bottom:12px}
  .confirm-btns{display:flex;gap:10px;margin-top:16px}
  .confirm-btns button{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans Thai',sans-serif;transition:.2s}
  .confirm-btns .c-cancel{border:2px solid #ddd;background:#fff;color:#888}
  .confirm-btns .c-cancel:hover{background:#f5f5f5}
  .confirm-btns .c-confirm{border:none;background:#F5C518;color:#1a1a1a;font-weight:700}
  .confirm-btns .c-confirm:hover{background:#e6b800}

  .nothing-msg{text-align:center;padding:20px;color:#e44d26;font-size:14px;font-weight:600}

  .toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#F5C518;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:600;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  .pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200}
  .pdf-overlay.show{display:flex}
  .pdf-spinner{text-align:center;color:#fff}
  .pdf-spinner .spin{font-size:40px;animation:spin 1s linear infinite;display:inline-block}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .pdf-spinner p{margin-top:12px;font-size:14px}

  .reset-btn{position:fixed;bottom:30px;right:30px;background:#F5C518;color:#1a1a1a;border:none;padding:14px 24px;border-radius:30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,197,24,.4);font-family:'Noto Sans Thai',sans-serif;transition:all .2s;z-index:100}
  .reset-btn:hover{transform:translateY(-2px)}

  @media(max-width:500px){body{padding:0;background:#fff}.phone-frame{width:100%;height:100vh;max-width:100%;border-radius:0;border:none;box-shadow:none}.reset-btn{display:none}}
  @media(min-width:501px) and (max-width:900px){body{padding:10px}.phone-frame{width:100%;max-width:420px;height:calc(100vh - 20px)}.reset-btn{bottom:10px;right:10px;padding:10px 18px;font-size:13px}}
  .chat-area::-webkit-scrollbar,.liff-body::-webkit-scrollbar{width:4px}
  .chat-area::-webkit-scrollbar-thumb,.liff-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
</style>
</head>
<body>

<div class="phone-frame" id="phone">

  <!-- ════ Screen 1: LINE Chat ════ -->
  <div class="screen active" id="screenChat">
    <div class="line-header">
      <span class="back">‹</span>
      <div class="av">CZ</div>
      <span class="nm">CRUZY Official</span>
    </div>
    <div class="chat-area" id="chatArea"></div>
  </div>

  <!-- ════ Screen 2: เลือกตัวติดใหญ่ ════ -->
  <div class="screen" id="screenBig">
    <div class="liff-header">
      <button class="close-btn" onclick="goScreen('screenChat')">✕</button>
      <span class="brand">CRUZY</span>
      <span class="step-label">1 / 2</span>
    </div>
    <div class="liff-body" id="bodyBig">
      <div class="page-title">🔷 ตัวติดใหญ่</div>
      <div class="page-subtitle">เลือกแบบที่ต้องการได้หลายแบบ (อย่างละ 1 ถุง)</div>
      <div class="search-bar">
        <input type="text" id="searchBig" placeholder="🔍 ค้นหาเลขแบบ..." oninput="filterGrid('big')">
      </div>
      <div class="style-grid" id="gridBig"></div>
      <div class="sel-summary" id="selSummaryBig"></div>
      <div style="height:120px"></div>
    </div>
    <div class="bottom-bar">
      <div class="bb-info" id="bigInfo">เลือกแล้ว <strong>0</strong> แบบ</div>
      <div class="bb-row">
        <button class="btn-skip" onclick="skipSize('big')">ไม่เอาตัวติดใหญ่</button>
        <button class="btn-primary" id="nextBigBtn" onclick="confirmBig()" disabled>ถัดไป →</button>
      </div>
    </div>
  </div>

  <!-- ════ Screen 3: เลือกตัวติดเล็ก ════ -->
  <div class="screen" id="screenSmall">
    <div class="liff-header">
      <button class="close-btn" onclick="goScreen('screenBig')">←</button>
      <span class="brand">CRUZY</span>
      <span class="step-label">2 / 2</span>
    </div>
    <div class="liff-body" id="bodySmall">
      <div class="page-title">🔹 ตัวติดเล็ก</div>
      <div class="page-subtitle">เลือกแบบที่ต้องการได้หลายแบบ (อย่างละ 1 ถุง)</div>
      <div class="search-bar">
        <input type="text" id="searchSmall" placeholder="🔍 ค้นหาเลขแบบ..." oninput="filterGrid('small')">
      </div>
      <div class="style-grid" id="gridSmall"></div>
      <div class="sel-summary" id="selSummarySmall"></div>
      <div style="height:120px"></div>
    </div>
    <div class="bottom-bar">
      <div class="bb-info" id="smallInfo">เลือกแล้ว <strong>0</strong> แบบ</div>
      <div class="bb-row">
        <button class="btn-skip" onclick="skipSize('small')">ไม่เอาตัวติดเล็ก</button>
        <button class="btn-primary" id="nextSmallBtn" onclick="confirmSmall()" disabled>สรุปคำสั่งซื้อ →</button>
      </div>
    </div>

    <!-- Confirm overlay -->
    <div class="overlay" id="overlay">
      <div class="confirm-sheet" id="confirmSheet"></div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<div class="pdf-overlay" id="pdfOverlay">
  <div class="pdf-spinner">
    <div class="spin">⏳</div>
    <p>กำลังสร้างไฟล์ PDF สรุปคำสั่งซื้อ...</p>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">🔄 เริ่มใหม่</button>

let selected = { big: new Set(), small: new Set() };
let skipped = { big: false, small: false };

/* ═══ Screen nav ═══ */
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══ Build grid ═══ */
function buildGrid(size, filter) {
  const gridEl = document.getElementById(size === 'big' ? 'gridBig' : 'gridSmall');
  const sel = selected[size];
  const filtered = filter
    ? allStyles.filter(s => s.name.includes(filter) || String(s.id).includes(filter))
    : allStyles;
  gridEl.innerHTML = filtered.map(s => `
    <div class="style-card ${sel.has(s.id)?'selected':''}" data-id="${s.id}" onclick="toggleStyle('${size}',${s.id})">
      <div class="size-badge">${size==='big'?'หมุดใหญ่':'หมุดเล็ก'}</div>
      <div class="st-img"><img src="${s.img}" alt="${s.name}" loading="lazy"></div>
      <div class="st-label">${s.name}</div>
      <div class="st-check">✓</div>
    </div>`).join('');
}

function filterGrid(size) {
  buildGrid(size, document.getElementById(size==='big'?'searchBig':'searchSmall').value.trim());
}

/* ═══ Toggle ═══ */
function toggleStyle(size, id) {
  const sel = selected[size];
  sel.has(id) ? sel.delete(id) : sel.add(id);
  const grid = document.getElementById(size==='big'?'gridBig':'gridSmall');
  grid.querySelectorAll('.style-card').forEach(c => c.classList.toggle('selected', sel.has(+c.dataset.id)));
  updateUI(size);
}

function removeFromSel(size, id) {
  selected[size].delete(id);
  buildGrid(size);
  updateUI(size);
}

function updateUI(size) {
  const sel = selected[size];
  // Summary tags
  const sumEl = document.getElementById(size==='big'?'selSummaryBig':'selSummarySmall');
  if (sel.size === 0) { sumEl.innerHTML = ''; }
  else {
    sumEl.innerHTML = [...sel].sort((a,b)=>a-b).map(id => {
      const s = allStyles.find(x=>x.id===id);
      return `<div class="sel-tag"><img src="${s.img}"><span>${s.name}</span><span class="remove" onclick="event.stopPropagation();removeFromSel('${size}',${id})">✕</span></div>`;
    }).join('');
  }
  // Info + button
  document.getElementById(size==='big'?'bigInfo':'smallInfo').innerHTML = 'เลือกแล้ว <strong>' + sel.size + '</strong> แบบ';
  document.getElementById(size==='big'?'nextBigBtn':'nextSmallBtn').disabled = sel.size === 0;
}

/* ═══ Confirm / Skip ═══ */
function confirmBig() {
  skipped.big = false;
  goScreen('screenSmall');
}

function skipSize(size) {
  selected[size].clear();
  skipped[size] = true;
  if (size === 'big') {
    goScreen('screenSmall');
  } else {
    // skipping small — go to summary if big has items
    if (selected.big.size > 0) {
      showConfirm();
    } else {
      // both empty
      showNothingAlert();
    }
  }
}

function confirmSmall() {
  skipped.small = false;
  if (selected.big.size === 0 && selected.small.size === 0) {
    showNothingAlert();
    return;
  }
  showConfirm();
}

function showNothingAlert() {
  const sheet = document.getElementById('confirmSheet');
  sheet.innerHTML = `
    <div class="nothing-msg">⚠️ ยังไม่ได้เลือกสินค้าเลย<br>กรุณากลับไปเลือกอย่างน้อย 1 รายการ</div>
    <div class="confirm-btns">
      <button class="c-cancel" onclick="hideConfirm();goScreen('screenBig')">← กลับไปเลือก</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

/* ═══ Confirm overlay ═══ */
function showConfirm() {
  const bigItems = [...selected.big].sort((a,b)=>a-b);
  const smallItems = [...selected.small].sort((a,b)=>a-b);
  const total = bigItems.length + smallItems.length;

  let html = '<h3>📋 สรุปคำสั่งซื้อ</h3>';

  // Stats
  html += '<div class="cs-stat">';
  html += '<div class="cs-stat-item"><div class="sv">' + bigItems.length + '</div><div class="sl">🔷 ถุงใหญ่</div></div>';
  html += '<div class="cs-stat-item"><div class="sv">' + smallItems.length + '</div><div class="sl">🔹 ถุงเล็ก</div></div>';
  html += '<div class="cs-stat-item"><div class="sv">' + total + '</div><div class="sl">รวมทั้งหมด</div></div>';
  html += '</div>';

  if (bigItems.length > 0) {
    html += '<div class="cs-group"><div class="cs-group-title">🔷 ตัวติดใหญ่ (' + bigItems.length + ' ถุง)</div><div class="cs-grid">';
    bigItems.forEach(id => {
      const s = allStyles.find(x=>x.id===id);
      html += '<div class="cs-item"><img src="'+s.img+'"><div class="cs-name">'+s.name+'</div></div>';
    });
    html += '</div></div>';
  }
  if (smallItems.length > 0) {
    html += '<div class="cs-group"><div class="cs-group-title">🔹 ตัวติดเล็ก (' + smallItems.length + ' ถุง)</div><div class="cs-grid">';
    smallItems.forEach(id => {
      const s = allStyles.find(x=>x.id===id);
      html += '<div class="cs-item"><img src="'+s.img+'"><div class="cs-name">'+s.name+'</div></div>';
    });
    html += '</div></div>';
  }

  html += '<div class="warning-text">⚠️ กดยืนยันแล้วจะไม่สามารถแก้ไขได้</div>';
  html += '<div class="confirm-btns"><button class="c-cancel" onclick="hideConfirm()">กลับไปแก้ไข</button><button class="c-confirm" onclick="submitOrder()">✅ คอนเฟิร์ม</button></div>';

  document.getElementById('confirmSheet').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function hideConfirm() { document.getElementById('overlay').classList.remove('show'); }

/* ═══ PDF Generation ═══ */
let jsPDFReady = false;

function loadJsPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) { jsPDFReady = true; resolve(); return; }
    const cdns = [
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js',
      'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js',
      'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js'
    ];
    let idx = 0;
    function tryNext() {
      if (idx >= cdns.length) { reject(new Error('Failed to load jsPDF from all CDNs')); return; }
      const s = document.createElement('script');
      s.src = cdns[idx++];
      s.onload = () => {
        if (window.jspdf) { jsPDFReady = true; resolve(); }
        else tryNext();
      };
      s.onerror = () => tryNext();
      document.head.appendChild(s);
    }
    tryNext();
  });
}

async function generatePDF(orderId) {
  await loadJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const pw = 210, ph = 297, margin = 15;

  const bigItems = [...selected.big].sort((a,b)=>a-b);
  const smallItems = [...selected.small].sort((a,b)=>a-b);
  const total = bigItems.length + smallItems.length;
  const now = new Date();
  const dateStr = now.getFullYear()+'-'+(''+(now.getMonth()+1)).padStart(2,'0')+'-'+(''+ now.getDate()).padStart(2,'0')+' '+(''+ now.getHours()).padStart(2,'0')+':'+(''+ now.getMinutes()).padStart(2,'0');

  // Header bar
  doc.setFillColor(26,26,26);
  doc.rect(0,0,pw,36,'F');
  doc.setTextColor(245,197,24);
  doc.setFontSize(24);
  doc.setFont('Helvetica','bold');
  doc.text('CRUZY',margin,16);
  doc.setFontSize(9);
  doc.setFont('Helvetica','normal');
  doc.setTextColor(200,200,200);
  doc.text('Order Summary  |  3D Stickers',margin,25);
  doc.setTextColor(245,197,24);
  doc.setFontSize(10);
  doc.text(orderId,pw-margin,16,{align:'right'});
  doc.setTextColor(200,200,200);
  doc.setFontSize(9);
  doc.text(dateStr,pw-margin,25,{align:'right'});

  // Summary stats bar
  let y = 44;
  doc.setFillColor(255,253,232);
  doc.roundedRect(margin,y,pw-margin*2,20,3,3,'F');
  doc.setDrawColor(245,197,24);
  doc.roundedRect(margin,y,pw-margin*2,20,3,3,'S');

  const thirdW = (pw-margin*2)/3;
  doc.setFontSize(9);
  doc.setFont('Helvetica','normal');
  doc.setTextColor(120,120,120);
  doc.text('BIG', margin+thirdW*0+thirdW/2, y+8, {align:'center'});
  doc.text('SMALL', margin+thirdW*1+thirdW/2, y+8, {align:'center'});
  doc.text('TOTAL', margin+thirdW*2+thirdW/2, y+8, {align:'center'});
  doc.setFontSize(13);
  doc.setFont('Helvetica','bold');
  doc.setTextColor(26,26,26);
  doc.text(bigItems.length+' bags', margin+thirdW*0+thirdW/2, y+16, {align:'center'});
  doc.text(smallItems.length+' bags', margin+thirdW*1+thirdW/2, y+16, {align:'center'});
  doc.setTextColor(184,148,14);
  doc.text(total+' bags', margin+thirdW*2+thirdW/2, y+16, {align:'center'});
  y += 28;

  // Draw image grid section (no emoji, English only)
  function drawSection(label, items) {
    if (items.length === 0) return;
    if (y + 20 > ph - 20) { doc.addPage(); y = margin; }

    // Section header bar
    doc.setFillColor(26,26,26);
    doc.roundedRect(margin,y,pw-margin*2,10,2,2,'F');
    doc.setTextColor(245,197,24);
    doc.setFontSize(11);
    doc.setFont('Helvetica','bold');
    doc.text(label + '  (' + items.length + ' bags)',margin+5,y+7);
    y += 14;

    const cols = 5;
    const gap = 4;
    const imgSize = (pw - margin*2 - (cols-1)*gap) / cols;
    const cellH = imgSize + 8;

    for (let i = 0; i < items.length; i++) {
      const col = i % cols;
      if (col === 0 && i > 0 && y + cellH > ph - 15) {
        doc.addPage();
        y = margin;
      }
      const x = margin + col * (imgSize + gap);
      const s = allStyles.find(st => st.id === items[i]);
      if (s) {
        try {
          doc.setDrawColor(230,230,230);
          doc.roundedRect(x,y,imgSize,imgSize,2,2,'S');
          doc.addImage(s.img,'JPEG',x+0.5,y+0.5,imgSize-1,imgSize-1);
          doc.setTextColor(85,85,85);
          doc.setFontSize(7);
          doc.setFont('Helvetica','normal');
          doc.text('#'+items[i],x+imgSize/2,y+imgSize+5,{align:'center'});
        } catch(e) {}
      }
      if (col === cols-1) y += cellH;
    }
    if (items.length % cols !== 0) y += cellH;
    y += 4;
  }

  drawSection('BIG Stickers', bigItems);
  drawSection('SMALL Stickers', smallItems);

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for (let p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFillColor(245,245,240);
    doc.rect(0,ph-12,pw,12,'F');
    doc.setTextColor(170,170,170);
    doc.setFontSize(7);
    doc.setFont('Helvetica','normal');
    doc.text('CRUZY Order '+orderId+'  |  '+dateStr,pw/2,ph-5,{align:'center'});
    doc.text('Page '+p+'/'+pageCount,pw-margin,ph-5,{align:'right'});
  }

  return doc;
}

/* ═══ Submit ═══ */
async function submitOrder() {
  hideConfirm();
  const orderId = '#CRZ' + Date.now().toString().slice(-6);
  const fileName = 'CRUZY-Order-' + orderId.replace('#','') + '.pdf';

  document.getElementById('pdfOverlay').classList.add('show');
  let pdfBlobUrl = null;
  try {
    const doc = await generatePDF(orderId);
    const blob = doc.output('blob');
    pdfBlobUrl = URL.createObjectURL(blob);
  } catch(e) { console.error('PDF error:', e); }
  document.getElementById('pdfOverlay').classList.remove('show');

  // Back to chat
  goScreen('screenChat');
  const chatArea = document.getElementById('chatArea');
  const bigItems = [...selected.big].sort((a,b)=>a-b);
  const smallItems = [...selected.small].sort((a,b)=>a-b);
  const total = bigItems.length + smallItems.length;

  const urow = document.createElement('div');
  urow.className = 'msg-row user';
  urow.innerHTML = '<div class="bubble">คอนเฟิร์มสั่งตัวติด 3D แล้ว!</div>';
  chatArea.appendChild(urow);

  setTimeout(() => {
    let rows = '';
    if (bigItems.length > 0) {
      rows += '<div class="s-group">BIG</div>';
      bigItems.forEach(id => { rows += '<div class="s-row"><span class="lb">#'+id+'</span><span class="vl">1 bag</span></div>'; });
    }
    if (smallItems.length > 0) {
      rows += '<div class="s-group">SMALL</div>';
      smallItems.forEach(id => { rows += '<div class="s-row"><span class="lb">#'+id+'</span><span class="vl">1 bag</span></div>'; });
    }
    const brow = document.createElement('div');
    brow.className = 'msg-row bot';
    brow.innerHTML = '<div class="bot-av">CZ</div><div class="summary-card"><div class="s-header">CRUZY Order Summary</div><div class="s-body">'+rows+'<div class="s-row" style="border-top:2px solid #F5C518;margin-top:4px;padding-top:10px;"><span class="lb">Big '+bigItems.length+' / Small '+smallItems.length+'</span><span class="vl" style="color:#b8940e">Total '+total+' bags</span></div></div><div class="s-id">'+orderId+'</div></div>';
    chatArea.appendChild(brow);

    // PDF file bubble
    setTimeout(() => {
      const pdfRow = document.createElement('div');
      pdfRow.className = 'msg-row bot';
      if (pdfBlobUrl) {
        pdfRow.innerHTML = '<div class="bot-av">CZ</div><div class="bubble" style="padding:0;overflow:hidden;max-width:240px;"><a href="'+pdfBlobUrl+'" download="'+fileName+'" style="display:flex;align-items:center;gap:10px;padding:12px 14px;text-decoration:none;color:#333;"><div style="width:40px;height:40px;background:#e44d26;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="color:white;font-size:11px;font-weight:800;">PDF</span></div><div><div style="font-size:13px;font-weight:600;color:#333;">'+fileName+'</div><div style="font-size:11px;color:#06C755;margin-top:2px;">Tap to download</div></div></a></div>';
      } else {
        pdfRow.innerHTML = '<div class="bot-av">CZ</div><div class="bubble">PDF could not be generated.</div>';
      }
      chatArea.appendChild(pdfRow);

      setTimeout(() => {
        const b2 = document.createElement('div');
        b2.className = 'msg-row bot';
        b2.innerHTML = '<div class="bot-av">CZ</div><div class="bubble">Thank you for your order! We will contact you within 24 hours.</div>';
        chatArea.appendChild(b2);
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 500);
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 400);
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 600);
}

/* ═══ Chat Init ═══ */
function showChatInit() {
  const c = document.getElementById('chatArea');
  c.innerHTML = '';
  const r1 = document.createElement('div');
  r1.className = 'msg-row bot';
  r1.innerHTML = '<div class="bot-av">CZ</div><div class="bubble">สวัสดีครับ! 🙏<br>ยินดีต้อนรับสู่ <strong>CRUZY</strong><br>กดปุ่มด้านล่างเพื่อสั่งซื้อได้เลยครับ</div>';
  c.appendChild(r1);
  setTimeout(() => {
    const r2 = document.createElement('div');
    r2.className = 'msg-row bot';
    r2.innerHTML = '<div class="bot-av">CZ</div><div class="miniapp-card" onclick="goScreen(\'screenBig\')"><div class="card-banner"><div class="brand-text">CRUZY</div></div><div class="card-info"><h4>✨ สั่งตัวติด 3D</h4><p>อุปกรณ์เสริม ตัวติด 3D<br>เลือกแบบ ใหญ่/เล็ก สั่งได้หลายแบบ</p><span class="open-tag">เปิดสั่งซื้อ ›</span></div></div>';
    c.appendChild(r2);
    c.scrollTop = c.scrollHeight;
  }, 400);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  selected = { big: new Set(), small: new Set() };
  skipped = { big: false, small: false };
  ['searchBig','searchSmall'].forEach(id => document.getElementById(id).value = '');
  buildGrid('big'); buildGrid('small');
  updateUI('big'); updateUI('small');
  goScreen('screenChat');
  showChatInit();
}

// Init
buildGrid('big'); buildGrid('small');
updateUI('big'); updateUI('small');
showChatInit();

// Preload jsPDF in background
setTimeout(() => loadJsPDF().catch(()=>{}), 2000);
</script>
